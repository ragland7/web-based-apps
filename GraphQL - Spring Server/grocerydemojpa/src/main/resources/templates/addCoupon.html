<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Add Coupon</title>
    <link rel="stylesheet" th:href="@{/styles.css}" />
  </head>
  <body>
    <h2>Add a New Coupon</h2>
    <form method="post" action="/addCoupon">
      <!-- Coupon Name -->
      <div>
        <label for="name">Coupon Name:</label>
        <input type="text" id="name" name="name" required />
      </div>
      <br />

      <!-- Savings -->
      <div>
        <label for="savings">Savings (amount):</label>
        <input type="number" id="savings" name="savings" step="0.01" required />
      </div>
      <br />

      <!-- Select Grocery Item -->
      <div>
        <label for="grocery">Select Grocery Item:</label>
        <select id="grocery" name="groceryId" required>
          <option value="" disabled selected>Select an item</option>
          <option th:each="item : ${groceries}" th:value="${item.id}" th:text="${item.name}"></option>
        </select>
      </div>
      <br />

      <!-- Submit and Navigation Buttons -->
      <div>
        <button type="submit">Add Coupon</button>
        <button type="button" onclick="location.href='/groceries';">Go Back</button>
      </div>

      <!-- Success/Error Message -->
      <div th:if="${successMessage}" style="color: green;" th:text="${successMessage}"></div>
      <div th:if="${errorMessage}" style="color: red;" th:text="${errorMessage}"></div>
    </form>
  </body>
</html>
